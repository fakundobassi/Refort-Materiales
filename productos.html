<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo - REFORT MATERIALES</title>
  <link rel="icon" type="image/png" href="img/logorefort.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <a href="index.html" class="logo-link"><h1>REFORT MATERIALES</h1></a>
  <button class="hamburger" id="menuToggle" aria-label="Abrir menú">
    <span></span><span></span><span></span>
  </button>
  <nav id="mainNav">
    <a href="index.html">Inicio</a>
    <a href="productos.html">Catálogo</a>
    <a href="contacto.html">Contacto</a>
  </nav>
</header>

<section class="productos reveal" style="padding-top: 100px;">
  <h2>Catálogo Completo</h2>
  <div class="grid" id="productosContainer"></div>
</section>

<!-- Floating Cart Button -->
<button id="cartBtn" class="cart-btn">
  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-cart3" viewBox="0 0 16 16">
    <path d="M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .49.598l-1 5a.5.5 0 0 1-.465.401l-9.397.472L4.415 11H13a.5.5 0 0 1 0 1H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5M3.102 4l.84 4.479 9.144-.459L13.89 4zM5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4m7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4m-7 1a1 1 0 1 1 0 2 1 1 0 0 1 0-2m7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2"/>
  </svg>
  <span id="cartCount">0</span>
</button>

<!-- Modal -->
<div id="cartModal" class="modal">
  <div class="modal-content">
    <span class="close-btn">&times;</span>
    <h2>Tu Presupuesto</h2>
    <div id="listaPresupuesto"></div>
    <p id="contador" class="contador-text"></p>
    <button id="limpiar" class="btn secundario">Limpiar presupuesto</button>
    <h3>Datos del cliente</h3>
    <input type="text" id="nombre" placeholder="Nombre *">
    <input type="tel" id="telefono" placeholder="Teléfono *">
    <input type="email" id="email" placeholder="Email (opcional)">
    <button id="enviar" class="btn btn-whatsapp">Consultar por WhatsApp</button>
  </div>
</div>

<footer id="contacto">
  <p class="footer-copy">© 2026 REFORT MATERIALES</p>
  <p class="footer-credit">Sitio web creado por <a href="https://fakundobassi.github.io/Facundo_Bassi/" target="_blank" rel="noopener">Facundo Bassi</a></p>
</footer>

<script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
<script src="script.js"></script>
<script src="transition.js"></script>
</body>
</html>
