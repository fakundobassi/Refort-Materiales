<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REFORT MATERIALES</title>
  <link rel="icon" type="image/png" href="img/logorefort.png">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header>
    <a href="index.html" class="logo-link">
      <h1>REFORT MATERIALES</h1>
    </a>
    <button class="hamburger" id="menuToggle" aria-label="Abrir menú">
      <span></span><span></span><span></span>
    </button>
    <nav id="mainNav">
      <a href="index.html">Inicio</a>
      <a href="productos.html">Catálogo</a>
      <a href="contacto.html">Contacto</a>
    </nav>
  </header>

  <section id="inicio" class="hero">
    <video class="hero-video desktop-video" autoplay muted loop playsinline>
      <source src="img/video.mp4" type="video/mp4">
    </video>
    <video class="hero-video mobile-video" autoplay muted loop playsinline>
      <source src="img/heromovil.mp4" type="video/mp4">
    </video>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <img src="img/logorefort.png" alt="Refort Materiales Logo" class="hero-logo">
    </div>
  </section>

  <section class="wa-full-section reveal">
    <a href="https://wa.me/2344400692" target="_blank" class="wa-full-btn">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
        <path
          d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.06 3.973L0 16l4.104-1.076a7.864 7.864 0 0 0 3.858.999h.001c4.363 0 7.92-3.558 7.924-7.926a7.862 7.862 0 0 0-2.326-5.671L13.601 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z" />
      </svg>
      CONSULTAR POR WHATSAPP
    </a>
  </section>

  <section id="productos" class="productos reveal">
    <h2>Productos Destacados</h2>
    <div class="slider-container">
      <div class="slider" id="sliderProductos"></div>
    </div>
    <div class="ver-mas-container">
      <a href="productos.html" class="btn">Ver catálogo completo</a>
    </div>
  </section>

  <!-- Floating Cart Button -->
  <button id="cartBtn" class="cart-btn">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-cart3"
      viewBox="0 0 16 16">
      <path
        d="M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .49.598l-1 5a.5.5 0 0 1-.465.401l-9.397.472L4.415 11H13a.5.5 0 0 1 0 1H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5M3.102 4l.84 4.479 9.144-.459L13.89 4zM5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4m7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4m-7 1a1 1 0 1 1 0 2 1 1 0 0 1 0-2m7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2" />
    </svg>
    <span id="cartCount">0</span>
  </button>

  <!-- Modal -->
  <div id="cartModal" class="modal">
    <div class="modal-content">
      <span class="close-btn">&times;</span>
      <h2>Tu Presupuesto</h2>

      <div id="listaPresupuesto"></div>
      <p id="contador" class="contador-text"></p>

      <button id="limpiar" class="btn secundario">Limpiar presupuesto</button>

      <h3>Datos del cliente</h3>
      <input type="text" id="nombre" placeholder="Nombre *">
      <input type="tel" id="telefono" placeholder="Teléfono *">
      <input type="email" id="email" placeholder="Email (opcional)">

      <button id="enviar" class="btn btn-whatsapp">Consultar por WhatsApp</button>
    </div>
  </div>

  <footer id="contacto">
    <p class="footer-copy">© 2026 REFORT MATERIALES</p>
    <p class="footer-credit">Sitio web creado por <a href="https://fakundobassi.github.io/Facundo_Bassi/" target="_blank" rel="noopener">Facundo Bassi</a></p>
  </footer>

  <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
  <script src="script.js"></script>
  <script src="transition.js"></script>
</body>

</html>
